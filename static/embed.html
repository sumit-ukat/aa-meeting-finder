<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Meeting Finder - Embeddable Widget</title>
</head>
<body>
    <p style="max-width:960px;margin:2rem auto;padding:0 1rem;font-family:sans-serif;color:#666;font-size:0.9rem;">
        Embeddable Recovery Meeting Finder widget (AA, CA, NA). Copy the <code>&lt;div id="recovery-meeting-finder"&gt;</code> and the <code>&lt;script&gt;</code> tag into any page.
    </p>

    <!-- ========== COPY EVERYTHING BELOW THIS LINE ========== -->

    <div id="recovery-meeting-finder"></div>

    <script>
    (function() {
        const API = "https://aa-meeting-finder-production.up.railway.app";
        const R = document.getElementById("recovery-meeting-finder");
        let fellowship = "aa", formType = "in_person", page = 1;
        const FL = { aa:"Alcoholics Anonymous", ca:"Cocaine Anonymous", na:"Narcotics Anonymous" };
        const FC = { aa:"#2980b9", ca:"#8e44ad", na:"#27ae60" };

        const s = document.createElement("style");
        s.textContent = `
#recovery-meeting-finder{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:960px;margin:0 auto;color:#2c3e50;line-height:1.6}
#recovery-meeting-finder *,#recovery-meeting-finder *::before,#recovery-meeting-finder *::after{box-sizing:border-box}
.rmf-p{background:#fff;border-radius:12px;padding:1.25rem 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:1.25rem}
.rmf-fs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.rmf-fb{padding:.5rem 1.2rem;border:2px solid #dce1e6;border-radius:8px;background:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;color:#7f8c8d}
.rmf-fb:hover{border-color:#aaa}
.rmf-fb.a-aa{border-color:#2980b9;color:#2980b9;background:#eaf2f8}
.rmf-fb.a-ca{border-color:#8e44ad;color:#8e44ad;background:#f5eef8}
.rmf-fb.a-na{border-color:#27ae60;color:#27ae60;background:#e8f8f0}
.rmf-tg{display:inline-flex;border-radius:8px;overflow:hidden;border:1.5px solid #dce1e6;margin-bottom:1rem}
.rmf-tg button{padding:.5rem 1.4rem;border:none;background:#fff;font-size:.88rem;font-weight:500;cursor:pointer;color:#7f8c8d;transition:all .2s}
.rmf-tg button.active{background:#1a5276;color:#fff}
.rmf-tg button:hover:not(.active){background:#eaf2f8}
.rmf-loc{margin-bottom:1rem;display:none}
.rmf-loc.show{display:block}
.rmf-loc label{display:block;font-weight:600;font-size:.82rem;margin-bottom:.35rem}
.rmf-loc input{width:100%;padding:.55rem .75rem;border:1.5px solid #dce1e6;border-radius:8px;font-size:.92rem;outline:none;transition:border-color .2s}
.rmf-loc input:focus{border-color:#2980b9}
.rmf-fl{display:flex;flex-wrap:wrap;gap:1.25rem;margin-bottom:1rem}
.rmf-fg{flex:1;min-width:200px}
.rmf-fg>span{display:block;font-weight:600;font-size:.82rem;margin-bottom:.4rem}
.rmf-days{display:flex;flex-wrap:wrap;gap:.4rem}
.rmf-days label{display:flex;align-items:center;gap:.25rem;padding:.3rem .6rem;border:1.5px solid #dce1e6;border-radius:6px;font-size:.82rem;cursor:pointer;user-select:none;transition:all .15s}
.rmf-days label:hover{border-color:#2980b9}
.rmf-days input{accent-color:#1a5276}
.rmf-days input:checked+span{color:#1a5276;font-weight:600}
.rmf-times{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}
.rmf-tc{position:relative;cursor:pointer;user-select:none}
.rmf-tc input{position:absolute;opacity:0;width:0;height:0}
.rmf-tc .tc{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.6rem .3rem;border:1.5px solid #dce1e6;border-radius:10px;background:#fff;transition:all .2s}
.rmf-tc:hover .tc{border-color:#2980b9;background:#f8fbff}
.rmf-tc input:checked+.tc{border-color:#1a5276;background:#eaf2f8;box-shadow:0 0 0 1px #1a5276}
.tc-i{font-size:1.3rem;line-height:1}.tc-l{font-size:.78rem;font-weight:600;color:#2c3e50}.tc-r{font-size:.68rem;color:#7f8c8d}
.rmf-acts{display:flex;gap:.75rem;flex-wrap:wrap}
.rmf-go{background:#e67e22;color:#fff;border:none;padding:.6rem 1.8rem;font-size:.95rem;font-weight:600;border-radius:8px;cursor:pointer;transition:background .2s}
.rmf-go:hover{background:#d35400}.rmf-go:disabled{background:#bdc3c7;cursor:not-allowed}
.rmf-cl{background:none;border:1.5px solid #dce1e6;padding:.55rem 1rem;border-radius:8px;cursor:pointer;font-size:.88rem;color:#7f8c8d}
.rmf-cnt{font-size:.95rem;font-weight:600;margin-bottom:.75rem}
.rmf-cnt b{color:#2980b9}
.rmf-badge{display:inline-block;padding:.12rem .5rem;border-radius:4px;font-size:.72rem;font-weight:700;color:#fff;margin-left:.4rem;vertical-align:middle}
.rmf-list{display:flex;flex-direction:column;gap:.6rem}
.rmf-card{background:#fff;border-radius:10px;padding:.9rem 1.1rem;box-shadow:0 1px 5px rgba(0,0,0,.04);border-left:4px solid #2980b9;display:grid;grid-template-columns:90px 1fr auto;gap:.8rem;align-items:start;transition:box-shadow .2s}
.rmf-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
.rmf-card.ol{border-left-color:#27ae60}.rmf-card.ca{border-left-color:#8e44ad}.rmf-card.na{border-left-color:#27ae60}
.rmf-cd{font-weight:700;font-size:.85rem;color:#1a5276;text-transform:uppercase;padding-top:.1rem}
.rmf-card.ol .rmf-cd{color:#27ae60}
.rmf-ci h4{font-size:.95rem;font-weight:600;margin:0 0 .2rem}
.rmf-ci h4 a{color:#2c3e50;text-decoration:none}.rmf-ci h4 a:hover{color:#2980b9}
.rmf-cl2{font-size:.82rem;color:#7f8c8d;margin-bottom:.3rem}
.rmf-cm{display:flex;flex-wrap:wrap;gap:.6rem;font-size:.8rem}
.rmf-cm span{color:#7f8c8d}.rmf-cm strong{color:#2c3e50}
.rmf-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
.rmf-tag{background:#eaf2f8;color:#1a5276;padding:.12rem .45rem;border-radius:4px;font-size:.72rem;font-weight:500}
.rmf-tag.ol-tag{background:#e8f8f0;color:#27ae60}
.rmf-cs{text-align:right;font-size:.8rem;white-space:nowrap}
.rmf-cs .pc{font-weight:700;color:#1a5276;font-size:.85rem}
.rmf-cs .di{color:#7f8c8d;margin-top:.15rem}
.rmf-cs a{display:inline-block;margin-top:.3rem;font-size:.78rem;color:#2980b9;text-decoration:none}
.rmf-cs a:hover{text-decoration:underline}
.rmf-pag{display:flex;justify-content:center;gap:.35rem;margin-top:1.25rem;flex-wrap:wrap}
.rmf-pag button{padding:.4rem .75rem;border:1.5px solid #dce1e6;border-radius:6px;background:#fff;cursor:pointer;font-size:.85rem;transition:all .2s}
.rmf-pag button.active{background:#1a5276;color:#fff;border-color:#1a5276}
.rmf-pag button:hover:not(.active){border-color:#2980b9}
.rmf-ld{text-align:center;padding:2.5rem;color:#7f8c8d}
.rmf-sp{width:32px;height:32px;border:3px solid #dce1e6;border-top-color:#2980b9;border-radius:50%;animation:rmf-s .8s linear infinite;margin:0 auto .8rem}
@keyframes rmf-s{to{transform:rotate(360deg)}}
.rmf-err{background:#fdecea;color:#c0392b;padding:.7rem 1rem;border-radius:8px;font-size:.88rem;margin-bottom:.75rem}
@media(max-width:640px){.rmf-card{grid-template-columns:1fr;gap:.4rem}.rmf-cs{text-align:left}.rmf-times{grid-template-columns:repeat(2,1fr)}.rmf-fl{flex-direction:column;gap:.75rem}}
`;
        document.head.appendChild(s);

        R.innerHTML = `
<div class="rmf-p">
<div class="rmf-fs"><button class="rmf-fb a-aa" id="rmf-aa">AA</button><button class="rmf-fb" id="rmf-ca">CA</button><button class="rmf-fb" id="rmf-na">NA</button></div>
<div class="rmf-tg"><button id="rmf-ip" class="active">In Person</button><button id="rmf-ol">Online Only</button></div>
<div class="rmf-loc show" id="rmf-loc"><label>Town, City, or Postcode</label><input type="text" id="rmf-in" placeholder="e.g. Bedford, MK40 1SQ, London..."/></div>
<div class="rmf-fl">
<div class="rmf-fg"><span>Days</span><div class="rmf-days" id="rmf-days">
<label><input type="checkbox" value="mon"><span>Mon</span></label>
<label><input type="checkbox" value="tue"><span>Tue</span></label>
<label><input type="checkbox" value="wed"><span>Wed</span></label>
<label><input type="checkbox" value="thu"><span>Thu</span></label>
<label><input type="checkbox" value="fri"><span>Fri</span></label>
<label><input type="checkbox" value="sat"><span>Sat</span></label>
<label><input type="checkbox" value="sun"><span>Sun</span></label>
</div></div>
<div class="rmf-fg"><span>When</span><div class="rmf-times" id="rmf-times">
<label class="rmf-tc"><input type="checkbox" value="morning"><div class="tc"><span class="tc-i">&#9788;</span><span class="tc-l">Morning</span><span class="tc-r">7am-12pm</span></div></label>
<label class="rmf-tc"><input type="checkbox" value="afternoon"><div class="tc"><span class="tc-i">&#9728;</span><span class="tc-l">Afternoon</span><span class="tc-r">12pm-5pm</span></div></label>
<label class="rmf-tc"><input type="checkbox" value="evening"><div class="tc"><span class="tc-i">&#9790;</span><span class="tc-l">Evening</span><span class="tc-r">5pm-10pm</span></div></label>
<label class="rmf-tc"><input type="checkbox" value="overnight"><div class="tc"><span class="tc-i">&#10035;</span><span class="tc-l">Late Night</span><span class="tc-r">10pm-7am</span></div></label>
</div></div>
</div>
<div class="rmf-acts"><button class="rmf-go" id="rmf-go">Find Meetings</button><button class="rmf-cl" id="rmf-reset">Clear Filters</button></div>
</div>
<div id="rmf-res"></div>`;

        const $=id=>document.getElementById(id);
        const loc=$("rmf-loc"),inp=$("rmf-in"),go=$("rmf-go"),res=$("rmf-res");

        function setF(f){fellowship=f;["aa","ca","na"].forEach(x=>{$("rmf-"+x).className="rmf-fb"+(x===f?" a-"+x:"")});}
        $("rmf-aa").onclick=()=>setF("aa");$("rmf-ca").onclick=()=>setF("ca");$("rmf-na").onclick=()=>setF("na");

        function setT(t){formType=t;$("rmf-ip").classList.toggle("active",t==="in_person");$("rmf-ol").classList.toggle("active",t==="online");loc.classList.toggle("show",t==="in_person");}
        $("rmf-ip").onclick=()=>setT("in_person");$("rmf-ol").onclick=()=>setT("online");

        function gc(id){return Array.from(document.querySelectorAll("#"+id+" input:checked")).map(c=>c.value);}
        $("rmf-reset").onclick=()=>{inp.value="";R.querySelectorAll('input[type="checkbox"]').forEach(c=>c.checked=false);res.innerHTML="";page=1;};
        inp.addEventListener("keydown",e=>{if(e.key==="Enter")search();});
        go.onclick=()=>search();

        function search(p){
            p=p||1;page=p;
            const l=inp.value.trim();
            if(formType==="in_person"&&!l){res.innerHTML='<div class="rmf-err">Please enter a town, city, or postcode.</div>';return;}
            const q=new URLSearchParams();
            q.set("fellowship",fellowship);q.set("form_type",formType);
            if(l)q.set("location",l);q.set("country","United Kingdom");
            const d=gc("rmf-days"),t=gc("rmf-times");
            if(d.length)q.set("days",d.join(","));if(t.length)q.set("times",t.join(","));
            q.set("page",p);
            go.disabled=true;go.textContent="Searching...";
            res.innerHTML=`<div class="rmf-ld"><div class="rmf-sp"></div><p>Searching ${FL[fellowship]} meetings...</p></div>`;
            fetch(API+"/api/search?"+q.toString()).then(r=>r.json()).then(data=>{go.disabled=false;go.textContent="Find Meetings";render(data);}).catch(err=>{go.disabled=false;go.textContent="Find Meetings";res.innerHTML=`<div class="rmf-err">Error: ${err.message}. Please try again.</div>`;});
        }
        window.__rmf_search=search;

        function render(data){
            const f=data.fellowship||fellowship;
            if(data.error){res.innerHTML=`<div class="rmf-err">${data.error}</div>`;return;}
            if(!data.meetings||!data.meetings.length){res.innerHTML='<div class="rmf-ld"><p style="font-size:1.3rem;margin-bottom:.3rem">No meetings found</p><p>Try adjusting your filters or location.</p></div>';return;}
            const tl=formType==="in_person"?"in-person":"online";
            let h=`<div class="rmf-cnt">Found <b>${data.total_results}</b> ${tl} meetings <span class="rmf-badge" style="background:${FC[f]}">${f.toUpperCase()}</span></div><div class="rmf-list">`;
            for(const m of data.meetings){
                const ol=m.type==="online";
                let cc="rmf-card";if(ol)cc+=" ol";if(f==="ca")cc+=" ca";if(f==="na")cc+=" na";
                h+=`<div class="${cc}"><div class="rmf-cd">${m.day||"\u2014"}</div><div class="rmf-ci">`;
                h+=m.detail_url?`<h4><a href="${m.detail_url}" target="_blank" rel="noopener">${m.name||"Meeting"}</a></h4>`:`<h4>${m.name||"Meeting"}</h4>`;
                if(m.location)h+=`<div class="rmf-cl2">${m.location}</div>`;
                h+=`<div class="rmf-cm">`;
                if(m.time)h+=`<span>Time: <strong>${m.time}</strong></span>`;
                if(m.duration)h+=`<span>Duration: <strong>${m.duration}</strong></span>`;
                if(ol)h+=`<span class="rmf-tag ol-tag">Online</span>`;
                h+=`</div>`;
                if(m.accessibility&&m.accessibility.length)h+=`<div class="rmf-tags">${m.accessibility.map(t=>`<span class="rmf-tag">${t}</span>`).join("")}</div>`;
                h+=`</div><div class="rmf-cs">`;
                if(m.postcode)h+=`<div class="pc">${m.postcode}</div>`;
                if(m.distance)h+=`<div class="di">${m.distance}</div>`;
                if(m.directions_url)h+=`<a href="${m.directions_url}" target="_blank" rel="noopener">Get Directions</a>`;
                h+=`</div></div>`;
            }
            h+=`</div>`;
            if(data.max_page>1){
                h+=`<div class="rmf-pag">`;
                if(page>1)h+=`<button onclick="__rmf_search(${page-1})">Prev</button>`;
                for(let i=1;i<=Math.min(data.max_page,10);i++)h+=`<button class="${i===page?'active':''}" onclick="__rmf_search(${i})">${i}</button>`;
                if(page<data.max_page)h+=`<button onclick="__rmf_search(${page+1})">Next</button>`;
                h+=`</div>`;
            }
            res.innerHTML=h;
        }
    })();
    </script>

    <!-- ========== COPY EVERYTHING ABOVE THIS LINE ========== -->

</body>
</html>
