<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Meeting Finder</title>
    <style>
        :root {
            --primary: #1a5276;
            --primary-light: #2980b9;
            --accent: #e67e22;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #dce1e6;
            --success: #27ae60;
            --tag-bg: #eaf2f8;
            --aa: #2980b9;
            --ca: #8e44ad;
            --na: #27ae60;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.25rem; }
        .header p { opacity: 0.85; font-size: 0.95rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        .search-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }
        .form-group label.group-label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: var(--text);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            background: var(--card-bg);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        /* Fellowship selector */
        .fellowship-select {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .fellowship-btn {
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-light);
        }
        .fellowship-btn:hover { border-color: #aaa; }
        .fellowship-btn.active-aa { border-color: var(--aa); color: var(--aa); background: #eaf2f8; }
        .fellowship-btn.active-ca { border-color: var(--ca); color: var(--ca); background: #f5eef8; }
        .fellowship-btn.active-na { border-color: var(--na); color: var(--na); background: #e8f8f0; }

        /* Type toggle */
        .type-toggle {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid var(--border);
            width: fit-content;
            margin-bottom: 1rem;
        }
        .type-toggle button {
            padding: 0.55rem 1.5rem;
            border: none;
            background: var(--card-bg);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
        }
        .type-toggle button.active {
            background: var(--primary);
            color: white;
        }
        .type-toggle button:hover:not(.active) { background: var(--tag-bg); }

        /* Day chips */
        .day-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .day-chips label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.7rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .day-chips label:hover { border-color: var(--primary-light); }
        .day-chips input[type="checkbox"] { accent-color: var(--primary); }
        .day-chips input[type="checkbox"]:checked + span { color: var(--primary); font-weight: 600; }

        /* Time cards */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
        }
        .time-slot { position: relative; cursor: pointer; user-select: none; }
        .time-slot input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .time-slot .slot-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            padding: 0.75rem 0.5rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            transition: all 0.2s;
        }
        .time-slot:hover .slot-card { border-color: var(--primary-light); background: #f8fbff; }
        .time-slot input:checked + .slot-card {
            border-color: var(--primary); background: var(--tag-bg);
            box-shadow: 0 0 0 1px var(--primary);
        }
        .slot-icon { font-size: 1.4rem; line-height: 1; }
        .slot-label { font-size: 0.8rem; font-weight: 600; color: var(--text); }
        .slot-range { font-size: 0.7rem; color: var(--text-light); }

        .search-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-btn:hover { background: #d35400; }
        .search-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

        .btn-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .results-count { font-size: 1rem; font-weight: 600; }
        .results-count span { color: var(--primary-light); }
        .fellowship-badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
        .fellowship-badge.aa { background: var(--aa); }
        .fellowship-badge.ca { background: var(--ca); }
        .fellowship-badge.na { background: var(--na); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 0.4rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .pagination button {
            padding: 0.45rem 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .pagination button:hover:not(.active) { border-color: var(--primary-light); }

        /* Meeting Cards */
        .meeting-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .meeting-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            border-left: 4px solid var(--primary-light);
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1rem;
            align-items: start;
            transition: box-shadow 0.2s;
        }
        .meeting-card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.09); }
        .meeting-card.online { border-left-color: var(--success); }
        .meeting-card.ca-card { border-left-color: var(--ca); }
        .meeting-card.na-card { border-left-color: var(--na); }

        .meeting-day {
            font-weight: 700; font-size: 0.9rem;
            color: var(--primary); text-transform: uppercase; padding-top: 0.15rem;
        }
        .meeting-card.online .meeting-day { color: var(--success); }

        .meeting-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
        .meeting-info h3 a { color: var(--text); text-decoration: none; }
        .meeting-info h3 a:hover { color: var(--primary-light); }

        .meeting-location { font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.4rem; }

        .meeting-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; font-size: 0.82rem; }
        .meeting-meta .meta-item { display: flex; align-items: center; gap: 0.25rem; }
        .meta-label { color: var(--text-light); }
        .meta-value { font-weight: 600; }

        .meeting-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
        .tag {
            background: var(--tag-bg); color: var(--primary);
            padding: 0.15rem 0.5rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 500;
        }

        .meeting-side { text-align: right; font-size: 0.82rem; white-space: nowrap; }
        .meeting-side .postcode { font-weight: 700; color: var(--primary); font-size: 0.9rem; }
        .meeting-side .distance { color: var(--text-light); margin-top: 0.2rem; }
        .directions-link {
            display: inline-block; margin-top: 0.4rem;
            font-size: 0.8rem; color: var(--primary-light); text-decoration: none;
        }
        .directions-link:hover { text-decoration: underline; }

        .loading, .empty-state { text-align: center; padding: 3rem; color: var(--text-light); }
        .loading .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border); border-top-color: var(--primary-light);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: #fdecea; color: #c0392b;
            padding: 0.8rem 1.2rem; border-radius: 8px;
            margin-bottom: 1rem; font-size: 0.9rem;
        }

        .location-row { display: none; }
        .location-row.visible { display: flex; }

        @media (max-width: 700px) {
            .meeting-card { grid-template-columns: 1fr; gap: 0.5rem; }
            .meeting-side { text-align: left; }
            .form-group { min-width: 100%; }
            .time-slots { grid-template-columns: repeat(2, 1fr); }
            .fellowship-select { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Recovery Meeting Finder</h1>
        <p>Search for AA, CA & NA meetings across the UK - In Person & Online</p>
    </div>

    <div class="container">
        <div class="search-panel">
            <!-- Fellowship selector -->
            <div class="fellowship-select">
                <button class="fellowship-btn active-aa" id="btn-aa" onclick="setFellowship('aa')">AA</button>
                <button class="fellowship-btn" id="btn-ca" onclick="setFellowship('ca')">CA</button>
                <button class="fellowship-btn" id="btn-na" onclick="setFellowship('na')">NA</button>
            </div>

            <div class="type-toggle">
                <button id="btn-in-person" class="active" onclick="setFormType('in_person')">In Person</button>
                <button id="btn-online" onclick="setFormType('online')">Online Only</button>
            </div>

            <div class="form-row location-row visible" id="location-row">
                <div class="form-group">
                    <label class="group-label" for="location">Town, City, or Postcode</label>
                    <input type="text" id="location" placeholder="e.g. Bedford, MK40 1SQ, London..." />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="group-label">Days</label>
                    <div class="day-chips" id="days-group">
                        <label><input type="checkbox" value="mon"><span>Mon</span></label>
                        <label><input type="checkbox" value="tue"><span>Tue</span></label>
                        <label><input type="checkbox" value="wed"><span>Wed</span></label>
                        <label><input type="checkbox" value="thu"><span>Thu</span></label>
                        <label><input type="checkbox" value="fri"><span>Fri</span></label>
                        <label><input type="checkbox" value="sat"><span>Sat</span></label>
                        <label><input type="checkbox" value="sun"><span>Sun</span></label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="group-label">When</label>
                    <div class="time-slots" id="times-group">
                        <label class="time-slot"><input type="checkbox" value="morning"><div class="slot-card"><span class="slot-icon">&#9788;</span><span class="slot-label">Morning</span><span class="slot-range">7am - 12pm</span></div></label>
                        <label class="time-slot"><input type="checkbox" value="afternoon"><div class="slot-card"><span class="slot-icon">&#9728;</span><span class="slot-label">Afternoon</span><span class="slot-range">12pm - 5pm</span></div></label>
                        <label class="time-slot"><input type="checkbox" value="evening"><div class="slot-card"><span class="slot-icon">&#9790;</span><span class="slot-label">Evening</span><span class="slot-range">5pm - 10pm</span></div></label>
                        <label class="time-slot"><input type="checkbox" value="overnight"><div class="slot-card"><span class="slot-icon">&#10035;</span><span class="slot-label">Late Night</span><span class="slot-range">10pm - 7am</span></div></label>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="search-btn" id="search-btn" onclick="doSearch()">Find Meetings</button>
                <button style="background:none;border:1.5px solid var(--border);padding:0.6rem 1.2rem;border-radius:8px;cursor:pointer;font-size:0.9rem;color:var(--text-light)" onclick="resetForm()">Clear Filters</button>
            </div>
        </div>

        <div id="results-area"></div>
    </div>

    <script>
        let currentFellowship = "aa";
        let currentFormType = "in_person";
        let currentPage = 1;

        const FELLOWSHIP_LABELS = { aa: "Alcoholics Anonymous", ca: "Cocaine Anonymous", na: "Narcotics Anonymous" };
        const FELLOWSHIP_COLORS = { aa: "#2980b9", ca: "#8e44ad", na: "#27ae60" };

        function setFellowship(f) {
            currentFellowship = f;
            document.querySelectorAll(".fellowship-btn").forEach(btn => {
                btn.className = "fellowship-btn";
            });
            document.getElementById("btn-" + f).classList.add("active-" + f);
        }

        function setFormType(type) {
            currentFormType = type;
            document.getElementById("btn-in-person").classList.toggle("active", type === "in_person");
            document.getElementById("btn-online").classList.toggle("active", type === "online");
            document.getElementById("location-row").classList.toggle("visible", type === "in_person");
        }

        function getSelectedValues(groupId) {
            return Array.from(document.querySelectorAll(`#${groupId} input[type="checkbox"]:checked`)).map(cb => cb.value);
        }

        function resetForm() {
            document.getElementById("location").value = "";
            document.querySelectorAll('#days-group input, #times-group input').forEach(cb => cb.checked = false);
            document.getElementById("results-area").innerHTML = "";
            currentPage = 1;
        }

        function doSearch(page) {
            page = page || 1;
            currentPage = page;

            const location = document.getElementById("location").value.trim();
            const days = getSelectedValues("days-group");
            const times = getSelectedValues("times-group");

            if (currentFormType === "in_person" && !location) {
                document.getElementById("results-area").innerHTML =
                    '<div class="error-msg">Please enter a town, city, or postcode to search for in-person meetings.</div>';
                return;
            }

            const params = new URLSearchParams();
            params.set("fellowship", currentFellowship);
            params.set("form_type", currentFormType);
            if (location) params.set("location", location);
            params.set("country", "United Kingdom");
            if (days.length) params.set("days", days.join(","));
            if (times.length) params.set("times", times.join(","));
            params.set("page", page);

            const btn = document.getElementById("search-btn");
            btn.disabled = true;
            btn.textContent = "Searching...";

            document.getElementById("results-area").innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Searching ${FELLOWSHIP_LABELS[currentFellowship]} meetings...</p>
                </div>`;

            fetch(`/api/search?${params.toString()}`)
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.textContent = "Find Meetings";
                    renderResults(data);
                })
                .catch(err => {
                    btn.disabled = false;
                    btn.textContent = "Find Meetings";
                    document.getElementById("results-area").innerHTML =
                        `<div class="error-msg">Error: ${err.message}. Please try again.</div>`;
                });
        }

        function renderResults(data) {
            const area = document.getElementById("results-area");
            const f = data.fellowship || currentFellowship;

            if (data.error) { area.innerHTML = `<div class="error-msg">${data.error}</div>`; return; }
            if (!data.meetings || !data.meetings.length) {
                area.innerHTML = `<div class="empty-state"><p style="font-size:2rem;margin-bottom:0.5rem">No meetings found</p><p>Try adjusting your search filters or location.</p></div>`;
                return;
            }

            const typeLabel = currentFormType === "in_person" ? "in-person" : "online";
            const badge = `<span class="fellowship-badge ${f}">${f.toUpperCase()}</span>`;

            let html = `
                <div class="results-header">
                    <div class="results-count">
                        Found <span>${data.total_results}</span> ${typeLabel} meetings ${badge}
                    </div>
                </div>
                <div class="meeting-list">`;

            for (const m of data.meetings) {
                const isOnline = m.type === "online";
                let cardClass = "meeting-card";
                if (isOnline) cardClass += " online";
                if (f === "ca") cardClass += " ca-card";
                if (f === "na") cardClass += " na-card";

                html += `<div class="${cardClass}">`;
                html += `<div class="meeting-day">${m.day || "\u2014"}</div>`;
                html += `<div class="meeting-info">`;
                if (m.detail_url) {
                    html += `<h3><a href="${m.detail_url}" target="_blank">${m.name || "Meeting"}</a></h3>`;
                } else {
                    html += `<h3>${m.name || "Meeting"}</h3>`;
                }
                if (m.location) html += `<div class="meeting-location">${m.location}</div>`;
                html += `<div class="meeting-meta">`;
                if (m.time) html += `<div class="meta-item"><span class="meta-label">Time:</span> <span class="meta-value">${m.time}</span></div>`;
                if (m.duration) html += `<div class="meta-item"><span class="meta-label">Duration:</span> <span class="meta-value">${m.duration}</span></div>`;
                if (isOnline) html += `<div class="meta-item"><span class="tag" style="background:#e8f8f0;color:var(--success)">Online</span></div>`;
                html += `</div>`;
                if (m.accessibility && m.accessibility.length) {
                    html += `<div class="meeting-tags">${m.accessibility.map(t => `<span class="tag">${t}</span>`).join("")}</div>`;
                }
                html += `</div>`;
                html += `<div class="meeting-side">`;
                if (m.postcode) html += `<div class="postcode">${m.postcode}</div>`;
                if (m.distance) html += `<div class="distance">${m.distance}</div>`;
                if (m.directions_url) html += `<a class="directions-link" href="${m.directions_url}" target="_blank">Get Directions</a>`;
                html += `</div></div>`;
            }
            html += `</div>`;

            if (data.max_page > 1) {
                html += `<div class="pagination">`;
                if (currentPage > 1) html += `<button onclick="doSearch(${currentPage - 1})">Prev</button>`;
                for (let p = 1; p <= Math.min(data.max_page, 10); p++) {
                    html += `<button class="${p === currentPage ? 'active' : ''}" onclick="doSearch(${p})">${p}</button>`;
                }
                if (data.max_page > 10) html += `<button disabled>...</button>`;
                if (currentPage < data.max_page) html += `<button onclick="doSearch(${currentPage + 1})">Next</button>`;
                html += `</div>`;
            }

            area.innerHTML = html;
        }

        document.getElementById("location").addEventListener("keydown", function(e) {
            if (e.key === "Enter") doSearch();
        });
    </script>
</body>
</html>
